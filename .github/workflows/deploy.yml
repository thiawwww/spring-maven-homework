name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: '17'
  CONTAINER_NAME: spring-maven-app
  APP_PORT: '8080'

jobs:

  # ----------------------------------------
  # JOB 1 : TESTS avec cache Maven persistant
  # ----------------------------------------
  test:
    name: 🧪 Tests Maven
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Cache Maven persistant entre les runs
      - name: 📦 Cache Maven persistant
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🧪 Exécution des tests
        run: mvn test -B --no-transfer-progress

      - name: 📊 Publication des résultats de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

  # ----------------------------------------
  # JOB 2 : BUILD & PUSH DOCKER
  # ----------------------------------------
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔑 Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Génération des métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=semver,pattern={{version}}

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push de l'image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ----------------------------------------
  # JOB 3 : SCAN DE SÉCURITÉ TRIVY
  # ----------------------------------------
  security-scan:
    name: 🔒 Scan de sécurité Trivy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: 🔒 Scan Trivy sur l'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: 📄 Rapport Trivy en JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest
          format: json
          output: trivy-report.json
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: 📤 Upload du rapport Trivy
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.json

  # ----------------------------------------
  # JOB 4 : STAGING
  # ----------------------------------------
  deploy-staging:
    name: 🟡 Déploiement Staging
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: 🟡 Déploiement en Staging
        run: |
          echo '${{ secrets.DOCKERHUB_TOKEN }}' | \
          docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin

          docker stop spring-maven-staging 2>/dev/null || true
          docker rm spring-maven-staging 2>/dev/null || true

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest

          docker run -d \
            --name spring-maven-staging \
            --restart unless-stopped \
            -p 8081:8080 \
            -e SPRING_PROFILES_ACTIVE=staging \
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest

          sleep 15
          docker ps | grep spring-maven-staging
          echo '✅ Staging déployé sur le port 8081 !'

      - name: 🧪 Tests de smoke sur Staging
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/ || echo "000")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "❌ Staging inaccessible"
            exit 1
          else
            echo "✅ Staging répond correctement"
          fi

      - name: 🔔 Notification échec Staging
        if: failure()
        run: |
          echo "❌ Déploiement Staging échoué !"
          echo "Commit: ${{ github.sha }}"

  # ----------------------------------------
  # JOB 5 : PRODUCTION avec rollback
  # ----------------------------------------
  deploy-production:
    name: 🚀 Déploiement Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: 🚀 Déploiement Production avec rollback
        run: |
          echo '${{ secrets.DOCKERHUB_TOKEN }}' | \
          docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin

          # Sauvegarder l'image actuelle pour rollback
          PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' spring-maven-app 2>/dev/null || echo "none")
          echo "Image précédente : $PREVIOUS_IMAGE"

          # Arrêter et supprimer l'ancien conteneur
          docker stop spring-maven-app 2>/dev/null || true
          docker rm spring-maven-app 2>/dev/null || true

          # Télécharger la nouvelle image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest

          # Démarrer le nouveau conteneur
          docker run -d \
            --name spring-maven-app \
            --restart unless-stopped \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest

          # Attendre le démarrage
          sleep 20

          # Vérifier que le conteneur tourne
          if docker ps | grep spring-maven-app; then
            echo "✅ Production déployée avec succès !"
          else
            echo "❌ Échec du déploiement, rollback en cours..."
            docker stop spring-maven-app 2>/dev/null || true
            docker rm spring-maven-app 2>/dev/null || true
            if [ "$PREVIOUS_IMAGE" != "none" ]; then
              docker run -d \
                --name spring-maven-app \
                --restart unless-stopped \
                -p 8080:8080 \
                -e SPRING_PROFILES_ACTIVE=prod \
                $PREVIOUS_IMAGE
              echo "🔄 Rollback effectué vers : $PREVIOUS_IMAGE"
            fi
            exit 1
          fi

      - name: 🔔 Notification de succès
        if: success()
        run: |
          echo '🎉 Production déployée avec succès !'
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven-homework:latest"
          echo "Commit: ${{ github.sha }}"

      - name: 🚨 Notification d'échec
        if: failure()
        run: |
          echo '❌ Déploiement Production échoué !'
          echo "Commit: ${{ github.sha }}"
          echo "⚠️ Vérifier si rollback effectué"
